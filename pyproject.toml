[tool.black]
line-length = 120
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | venv
    | _build
    | buck-out
    | build
    | dist
    | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = [".git", "__pycache__", ".env", "venv", ".venv"]

[tool.bandit]
exclude_dirs = ["tests", "test_*.py"]
skips = ["B101"]  # assert 语句在测试中是允许的

[dependency-groups]
dev = [
    "akshare>=1.12.0",
    "baostock>=0.8.0",
    "dingtalk-stream>=0.24.3",
    "discord-py>=2.0.0",
    "efinance>=0.5.5",
    "fake-useragent>=1.4.0",
    "fastapi>=0.109.0",
    "google-generativeai>=0.8.0",
    "google-search-results>=2.4.0",
    "httpx[socks]>=0.28.1",
    "json-repair>=0.55.1",
    "lark-oapi>=1.0.0",
    "lxml-html-clean>=0.4.4",
    "markdown2>=2.4.0",
    "newspaper3k>=0.2.8",
    "numpy>=1.24.0",
